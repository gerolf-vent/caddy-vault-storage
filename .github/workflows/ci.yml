name: CI

on:
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "docker-compose.yaml"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "docker-compose.yaml"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-vault:
    name: Run Tests (Vault)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Start Vault
        run: docker compose up -d vault --wait

      - name: Setup Vault KV mount
        run: docker compose run --rm vault-setup

      - name: Show Vault logs on setup failure
        if: failure()
        run: docker compose logs vault vault-setup

      - name: Run Go tests
        run: docker compose run --rm --no-deps go-test

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  test-openbao:
    name: Run Tests (OpenBao)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Start OpenBao
        run: docker compose up -d openbao --wait

      - name: Setup OpenBao KV mount
        run: docker compose run --rm openbao-setup

      - name: Show OpenBao logs on setup failure
        if: failure()
        run: docker compose logs openbao openbao-setup

      - name: Run Go tests
        run: docker compose run --rm --no-deps go-test-openbao

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
